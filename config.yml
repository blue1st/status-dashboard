services:
  - id: web-app
    name: User Frontend
    category: Web
    provider: gcp
    icon: googlecloudrun
    tags: ["Product", "React"]
    description: "The main user-facing web application running on **Cloud Run**.\n\nKey features:\n- High availability\n- Global reach"
    recovery: "1. Check Cloud Run revisions\n2. Verify traffic splitting\n3. Run `gcloud app logs read`"
    depends_on: ["api-server"]
    check:
      plugin: http_check.sh
      args: ["https://example.com"]

  - id: api-server
    name: Backend API
    category: Core
    provider: gcp
    icon: googlecloudspanner
    tags: ["NodeJS", "API"]
    description: "Central business logic API."
    recovery: "Check Spanner instance CPU and latency."
    depends_on: ["database", "redis"]
    check:
      plugin: dummy_check.sh
      args: ["UP"]

  - id: database
    name: Spanner Database
    category: Backend
    provider: gcp
    icon: googlecloudspanner
    tags: ["Database", "Internal"]
    description: "Primary database for user data."
    recovery: "Check Spanner instance health."
    check:
      plugin: dummy_check.sh
      args: ["UP"]

  - id: storage
    name: Assets Storage (S3)
    category: Infrastructure
    provider: aws
    icon: amazons3
    tags: ["Storage", "AWS"]
    description: "Static assets and uploads."
    recovery: "Check S3 bucket permissions and lifecycle policies."
    check:
      plugin: dummy_check.sh
      args: ["UP"]

  - id: redis
    name: Cache Store (Redis)
    category: Backend
    provider: aws
    icon: redis
    tags: ["Cache", "Internal"]
    description: "Session and data cache."
    recovery: "Check ElastiCache metrics."
    check:
      plugin: dummy_check.sh
      args: ["UP"]

  - id: legacy-api
    name: Legacy API
    category: Web
    provider: github
    icon: github
    tags: ["Maintenance"]
    description: "API for legacy clients."
    recovery: "Contact the SRE team immediately if this goes down."
    depends_on: ["database"]
    check:
      plugin: dummy_check.sh
      args: ["NONE"]

  - id: maintenance-db
    name: Backup Archive
    category: Backend
    provider: aws
    icon: amazons3
    tags: ["Archive", "Long-term"]
    description: "Cold storage for old database backups. Not monitored in real-time."
    recovery: "Contact infrastructure team for manual restore."
    # No check configured
